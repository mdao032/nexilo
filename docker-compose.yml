version: '3.9'

# =============================================================================
# Nexilo — Environnement de développement local complet
#
# Usage :
#   Démarrer       : docker-compose up -d
#   Arrêter        : docker-compose down
#   Réinitialiser  : docker-compose down -v && docker-compose up -d
#   Logs app       : docker-compose logs -f nexilo-app
#   Logs postgres  : docker-compose logs -f postgres
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 + pgvector (extension vectorielle pré-installée)
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexilo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexilo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexilo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis 7 — cache des réponses IA + compteurs de quota
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: nexilo-redis
    restart: unless-stopped
    command: >
      redis-server
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MinIO — stockage objet S3-compatible (fichiers PDF)
  # Console web : http://localhost:9001  (nexilo / nexilo123)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: nexilo-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console Web
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-nexilo}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-nexilo123}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Nexilo App — Spring Boot (build local multi-stage)
  # ---------------------------------------------------------------------------
  nexilo-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexilo-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      # Base de données
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nexilo_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # IA
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-dummy}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-dummy}
      # Stockage
      STORAGE_PATH: /app/uploads
      # JWT
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# =============================================================================
# Volumes persistants
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  uploads_data:
    driver: local

